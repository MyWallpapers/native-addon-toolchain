name: Toolchain quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Build and package the native fixture
        shell: pwsh
        run: |
          & .github/scripts/build-native-hooks.ps1 `
            -RepositoryRoot fixtures/no-hooks `
            -OutputRoot "$env:RUNNER_TEMP/native/no-hooks"
          if (-not (Test-Path -LiteralPath "$env:RUNNER_TEMP/native/no-hooks/.empty" -PathType Leaf)) {
            throw 'A manifest without hooks did not produce the empty marker'
          }
          node .github/scripts/build-native-companions.mjs `
            --repository-root fixtures/native-hook `
            --output-root "$env:RUNNER_TEMP/native/companion"
          & .github/scripts/build-native-hooks.ps1 `
            -RepositoryRoot fixtures/native-hook `
            -OutputRoot "$env:RUNNER_TEMP/native/hooks"
          & .github/scripts/package-native-build.ps1 `
            -CompanionRoot "$env:RUNNER_TEMP/native/companion" `
            -HooksRoot "$env:RUNNER_TEMP/native/hooks" `
            -OutputArchive "$env:RUNNER_TEMP/native/package.zip"
          if (-not (Test-Path -LiteralPath "$env:RUNNER_TEMP/native/package.zip" -PathType Leaf)) {
            throw 'Native fixture package was not produced'
          }
